name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Lint Ruby for consistent style
        run: bin/rubocop -f github

  js-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Lint JS with ESLint
        run: bun run lint

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.3"
          - "3.4"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Install Appraisal gemfiles
        run: bundle exec appraisal install

      - name: Run unit tests
        env:
          RAILS_ENV: test
        run: bundle exec appraisal rails test

      - name: Run system tests
        env:
          RAILS_ENV: test
          CI: "true"
        run: bundle exec appraisal rails test:system

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: screenshots-ruby-${{ matrix.ruby }}
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore
